name = "houselog-api"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

# Secrets must be configured with wrangler secret put <NAME>.
# Required:
# - JWT_SECRET
# - CREDENTIALS_ENCRYPTION_KEY
# - RESEND_API_KEY
# - R2_ACCOUNT_ID
# - R2_ACCESS_KEY_ID
# - R2_SECRET_ACCESS_KEY
# - VAPID_PRIVATE_KEY

# --- CONFIGURACAO GLOBAL / PRODUCAO ---
# Production intentionally uses invalid placeholder resource IDs until the
# Cloudflare resources are created manually. Do not deploy production before:
#   npm run check:deploy-config:prod
[vars]
ENVIRONMENT = "production"
# CORS em production deve ser uma allowlist explicita. Nunca use "*"
# porque a API envia credentials no middleware CORS.
CORS_ORIGINS = "https://house-log.vercel.app"
# R2_PUBLIC_URL is optional and must not be hardcoded here. If public R2 access
# is intentionally enabled, configure it with:
#   wrangler secret put R2_PUBLIC_URL
R2_BUCKET_NAME = "houselog-assets"
APP_URL = "https://house-log.vercel.app"
# Custom domain same-site pair — required in production (see docs/TECH_DEBT_REGISTER.md TD-013).
# Both must share the same eTLD+1 so SameSite=Lax works with fetch + credentials: include.
APP_ORIGIN = "https://app.houselog.app"
API_ORIGIN = "https://api.houselog.app"

[[d1_databases]]
binding = "DB"
database_name = "houselog-db"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "houselog-assets"

[[kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000001"

[[queues.producers]]
binding = "QUEUE"
queue = "houselog-jobs"

[[queues.producers]]
binding = "DOCUMENT_INGESTION_QUEUE"
queue = "houselog-document-ingestion"

[[queues.consumers]]
queue = "houselog-jobs"
max_batch_size = 10
max_retries = 3

[[queues.consumers]]
queue = "houselog-document-ingestion"
max_batch_size = 10
max_retries = 3

[ai]
binding = "AI"

[triggers]
crons = ["0 * * * *", "0 6 * * *"]

# --- AMBIENTE DE DESENVOLVIMENTO (DEV) ---
# Comando: npx wrangler deploy --env dev
[env.dev]
name = "houselog-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
# Dev permite localhost automaticamente, mas manter origins reais aqui ajuda
# a testar previews e evita wildcard inseguro.
CORS_ORIGINS = "https://house-log.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
# R2_PUBLIC_URL: necessário APENAS se Cloudflare Image Resizing estiver habilitado
# na zona. Sem isso, thumbnails usam cópia do original (fallback seguro).
# ATENÇÃO: definir esta variável requer que o bucket tenha "Public access" ativo,
# o que contradiz a política de R2 privado por padrão (SECURITY.md).
# Para habilitar: defina via `wrangler secret put R2_PUBLIC_URL --env dev`
# com o domínio público do bucket dev (ex: pub-XXXXXXXX.r2.dev).
# R2_PUBLIC_URL = ""
R2_BUCKET_NAME = "houselog-assets-dev"
APP_URL = "http://localhost:3000"
APP_ORIGIN = "http://localhost:3000"
API_ORIGIN = "http://localhost:8787"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "houselog-db-dev"
database_id = "00000000-0000-0000-0000-000000000101"
migrations_dir = "src/db/migrations"

[[env.dev.r2_buckets]]
binding = "STORAGE"
bucket_name = "houselog-assets-dev"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000101"

[[env.dev.queues.producers]]
binding = "QUEUE"
queue = "houselog-jobs-dev"

[[env.dev.queues.producers]]
binding = "DOCUMENT_INGESTION_QUEUE"
queue = "houselog-document-ingestion-dev"

[[env.dev.queues.consumers]]
queue = "houselog-jobs-dev"
max_batch_size = 10
max_retries = 3

[[env.dev.queues.consumers]]
queue = "houselog-document-ingestion-dev"
max_batch_size = 10
max_retries = 3

[env.dev.ai]
binding = "AI"

# --- AMBIENTE DE STAGING ---
# Comando: npx wrangler deploy --env staging
# Staging deve usar recursos proprios e nunca apontar para dev ou production.
[env.staging]
name = "houselog-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
CORS_ORIGINS = "https://house-log-staging.vercel.app"
R2_BUCKET_NAME = "houselog-assets-staging"
APP_URL = "https://house-log-staging.vercel.app"
APP_ORIGIN = "https://house-log-staging.vercel.app"
API_ORIGIN = "https://houselog-api-staging.workers.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "houselog-db-staging"
database_id = "00000000-0000-0000-0000-000000000002"
migrations_dir = "src/db/migrations"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "houselog-assets-staging"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000002"

[[env.staging.queues.producers]]
binding = "QUEUE"
queue = "houselog-jobs-staging"

[[env.staging.queues.producers]]
binding = "DOCUMENT_INGESTION_QUEUE"
queue = "houselog-document-ingestion-staging"

[[env.staging.queues.consumers]]
queue = "houselog-jobs-staging"
max_batch_size = 10
max_retries = 3

[[env.staging.queues.consumers]]
queue = "houselog-document-ingestion-staging"
max_batch_size = 10
max_retries = 3

[env.staging.ai]
binding = "AI"
